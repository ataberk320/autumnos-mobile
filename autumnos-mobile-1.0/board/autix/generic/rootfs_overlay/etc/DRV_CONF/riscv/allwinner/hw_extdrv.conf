[PLATFORM_INFO]
soc_family=allwinner
board_name=d1_nezha

[G_ACCEL]
accelerator=/dev/g2d
drm_render_node=/dev/dri/card0
gbm_backend=sunxi-drm

[CAMERA_SPECS]
max_width=1280
max_height=720
pixel_format=NV21

[SERIAL_DEV_SPECS]
modem_port=/dev/ttyS1
modem_baudrate=115200

[DISP_SPECS]
screen_width=480
screen_height=800
touch_device=/dev/input/event1
backlight_path=/sys/class/backlight/sunxi_bl/brightness

[BATTERY_CAP]
battery_capacity_path=/sys/class/power_supply/battery/capacity
