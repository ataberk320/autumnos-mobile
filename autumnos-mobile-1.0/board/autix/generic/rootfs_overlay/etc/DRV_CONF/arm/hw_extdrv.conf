[CAMERA_SPECS]
max_width=1280
max_height=720
pixel_format=YUYV

[SERIAL_DEV_SPECS]
modem_port=/dev/ttyAMA0
modem_baudrate=115200

[DISP_SPECS]
screen_width=480
screen_height=480
touch_device=/dev/input/event1
backlight_path=/sys/class/backlight/backlight/brightness

[AUDIO_DEV_SPECS]
alsa_card_name=hw:0.0

[BATTERY_SPECS]
battery_node=/sys/class/power_supply/battery
